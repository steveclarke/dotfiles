# Steve's Tmux Config
# Base: Omarchy's tmux.conf, supplemented with Alt-letter (Zellij-style) bindings.

# =============================================================================
# PREFIX
# =============================================================================
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# =============================================================================
# OMARCHY BINDINGS (base layer — preserved verbatim)
# =============================================================================

# Reload config
bind q source-file ~/.config/tmux/tmux.conf \; display "Configuration reloaded"

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane Controls
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x kill-pane

bind -n C-M-Left  select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up    select-pane -U
bind -n C-M-Down  select-pane -D

bind -n C-M-S-Left  resize-pane -L 5
bind -n C-M-S-Down  resize-pane -D 5
bind -n C-M-S-Up    resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left    select-window -t -1
bind -n M-Right   select-window -t +1
bind -n M-S-Left  swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

bind -n M-Up   switch-client -p
bind -n M-Down switch-client -n

# =============================================================================
# STEVE'S ADDITIONS — Alt-letter (Zellij-style, no prefix needed)
# =============================================================================

# Pane navigation: Alt + h/j/k/l (vim style — supplement to C-M-Arrows)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Split creation: Alt + d (down), Alt + r (right)
bind -n M-d split-window -v -c "#{pane_current_path}"
bind -n M-r split-window -h -c "#{pane_current_path}"

# Zoom pane toggle
bind -n M-f resize-pane -Z

# Kill pane
bind -n M-x kill-pane

# Window: new / prev / next
bind -n M-c new-window -c "#{pane_current_path}"
bind -n M-, previous-window
bind -n M-. next-window

# Swap panes spatially
bind -n S-Left  swap-pane -t '{left-of}'
bind -n S-Right swap-pane -t '{right-of}'
bind -n S-Up    swap-pane -t '{up-of}'
bind -n S-Down  swap-pane -t '{down-of}'

# Scratchpad toggle
bind -n M-s if-shell "[ '#{window_name}' = 'scratchpad' ]" \
    "last-window" \
    "if-shell 'tmux select-window -t scratchpad 2>/dev/null' '' 'new-window -n scratchpad'"

# Popup terminal — toggle a persistent "popup" session (quake-mode style).
# detach-on-destroy is forced on for the popup session so `exit` closes the
# popup cleanly instead of switching the client into another session.
bind -n M-p if-shell -F '#{==:#{session_name},popup}' \
    'detach-client' \
    "display-popup -E -w 80% -h 80% 'tmux has-session -t popup 2>/dev/null || tmux new-session -d -s popup; tmux set-option -t popup detach-on-destroy on; tmux attach -t popup'"

# Pane resize via prefix + Arrow (repeatable)
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5

# Mnemonic splits: | = vertical bar = horizontal split, - = horizontal bar = vertical split
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Copy-mode word/char jumps (additions to Omarchy's v/y)
bind -T copy-mode-vi w send -X next-word
bind -T copy-mode-vi b send -X previous-word
bind -T copy-mode-vi f send -X jump-to-char
bind -T copy-mode-vi F send -X jump-to-char -b

# Extended keys: pass Shift+Enter, Ctrl+Enter, etc. through to apps
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'

# =============================================================================
# GENERAL (Omarchy)
# =============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

# =============================================================================
# STATUS BAR (Omarchy)
# =============================================================================
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue
