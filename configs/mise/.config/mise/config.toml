[tools]
bun = "latest"
go = "latest"
node = "25.9.0"
python = "latest"
ruby = "3.4"

[settings]
node.default_packages_file = "~/.default-npm-packages"

[env]
# Pin baseruby for ruby-build so ./configure doesn't probe $PATH and
# pick up the mise ruby shim, which recurses back into `mise install`.
RUBY_CONFIGURE_OPTS = "--with-baseruby=/usr/bin/ruby"
