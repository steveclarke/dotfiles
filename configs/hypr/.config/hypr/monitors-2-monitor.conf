# 2-monitor layout — tucked away for reuse when this machine moves locations.
# To activate: in monitors.conf, comment out the 3-monitor block and replace
# with `source = ~/.config/hypr/monitors-2-monitor.conf`.
#
# Left:  DP-3 — secondary
# Right: DP-1 — main/primary
#
# Workspace assignment:
#   Right (DP-1, main):       1 Main, 2 Dev Primary, 3 Flex Primary
#   Left  (DP-3, secondary):  4 Productivity, 5 Dev Secondary, 6 Flex Secondary
monitor = DP-3, preferred, 0x0, 1.333333, vrr, 0
monitor = DP-1, preferred, 2880x0, 1.333333, vrr, 0

workspace = 1, monitor:DP-1, default:true, persistent:true
workspace = 2, monitor:DP-1, persistent:true
workspace = 3, monitor:DP-1, persistent:true
workspace = 4, monitor:DP-3, default:true, persistent:true
workspace = 5, monitor:DP-3, persistent:true
workspace = 6, monitor:DP-3, persistent:true
