# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Telegram, exec, omarchy-launch-or-focus ^telegramdesktop$ "uwsm-app -- Telegram"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, VS Code, exec, setsid uwsm-app -- code
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Voice input
# Right Alt — toggle dictation
# (Modifier keys can't reliably drive push-to-talk in Hyprland — toggle is fine because it only needs the press event.)
bindd = , Alt_R, Dictation (toggle), exec, voxtype record toggle
# O key (keycode 192) — toggle dictation
bindd = , code:192, Dictation (toggle), exec, voxtype record toggle
# X key (keycode 191) — push-to-talk
bindd = , code:191, Dictation (push-to-talk start), exec, voxtype record start
bindrd = , code:191, Dictation (push-to-talk stop), exec, voxtype record stop

# Middle-click drag to move floating windows (no keyboard needed)
bindmd = , mouse:274, Move window, movewindow

# Numpad workspace switching (Super + KP1-6)
# KP1=Main, KP2=Dev Primary, KP3=Flex Primary
# KP4=Productivity, KP5=Dev Secondary, KP6=Flex Secondary
bindd = SUPER, code:87, Workspace 1 (Main), workspace, 1
bindd = SUPER, code:88, Workspace 2 (Dev Primary), workspace, 2
bindd = SUPER, code:89, Workspace 3 (Flex Primary), workspace, 3
bindd = SUPER, code:83, Workspace 4 (Productivity), workspace, 4
bindd = SUPER, code:84, Workspace 5 (Dev Secondary), workspace, 5
bindd = SUPER, code:85, Workspace 6 (Flex Secondary), workspace, 6

# Numpad move window to workspace (Super + Shift + KP1-6)
bindd = SUPER SHIFT, code:87, Move to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, code:88, Move to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, code:89, Move to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, code:83, Move to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, code:84, Move to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, code:85, Move to workspace 6, movetoworkspace, 6

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Override the stock omarchy scaling cycle (1 / 1.6 / 2 / 3) with a custom
# one that adds 1.33 — a clean 4/3 scale for 4K displays.
unbind = SUPER, Slash
bindd = SUPER, Slash, Cycle monitor scaling, exec, $HOME/bin/monitor-scaling-cycle

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu
