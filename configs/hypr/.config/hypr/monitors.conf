# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
env = GDK_SCALE,2

# 3-monitor layout — Dell S2725QC ×3 @ 4K, 1.333333 scale (retina-class)
# Logical width per monitor: 3840 / 1.333333 = 2880
#
# Left:   HDMI-A-1 (dGPU) — Dell S2725QC 5C4G464
# Middle: DP-2     (dGPU outermost port) — Dell S2725QC 154G464 — primary, gaming
# Right:  DP-4     (motherboard iGPU, Raphael) — Dell S2725QC H04G464
#
# Why the right monitor is on the iGPU: GPU bracket clearance — the 8K DP cable
# shells are too wide to fit 3-up next to HDMI on the dGPU. Motherboard DP
# bypasses the clearance war. The middle (primary) monitor stays on the dGPU
# so it gets full Radeon performance for gaming and heavy workloads.
monitor = HDMI-A-1, 3840x2160@120, 0x0, 1.333333, vrr, 0
monitor = DP-2,     3840x2160@120, 2880x0, 1.333333, vrr, 0
monitor = DP-4,     3840x2160@120, 5760x0, 1.333333, vrr, 0

# Fallback for any unconfigured monitor (e.g. if a port renames after a reboot).
monitor = , preferred, auto, 1.333333

# Workspace-to-monitor pinning (3-monitor layout)
# Middle (DP-2, dGPU): 1 Main, 2 Dev Primary, 3 Flex Primary
# Left (HDMI-A-1, dGPU): 4 Productivity, 5 Dev Secondary, 6 Flex Secondary
# Right (DP-4, iGPU): 7, 8, 9
workspace = 1, monitor:DP-2, default:true, persistent:true
workspace = 2, monitor:DP-2, persistent:true
workspace = 3, monitor:DP-2, persistent:true
workspace = 4, monitor:HDMI-A-1, default:true, persistent:true
workspace = 5, monitor:HDMI-A-1, persistent:true
workspace = 6, monitor:HDMI-A-1, persistent:true
workspace = 7, monitor:DP-4, default:true, persistent:true
workspace = 8, monitor:DP-4, persistent:true
workspace = 9, monitor:DP-4, persistent:true

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.6

# Straight 1x setup for low-resolution displays like 1080p or 1440p
# Or for ultrawide monitors like 34" 3440x1440 or 49" 5120x1440
# env = GDK_SCALE,1
# monitor=,preferred,auto,1

# Portrait/rotated secondary monitor (transform: 1 = 90°, 3 = 270°)
# monitor = DP-2, preferred, auto, 1, transform, 1

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2
