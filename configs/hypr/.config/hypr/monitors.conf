# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
env = GDK_SCALE,2

# Left: DP-3 (Dell S2721QS D0X1M43) — secondary
# Right: DP-1 (Dell S2721QS 3QL0M43) — main/primary
monitor = DP-3, preferred, 0x0, 1.5, vrr, 0
monitor = DP-1, preferred, 2560x0, 1.5, vrr, 0

# Workspace-to-monitor pinning (2-monitor layout)
# Right monitor (DP-1): Main, Dev Primary, Flex Primary
# Left monitor (DP-3): Productivity, Dev Secondary, Flex Secondary
workspace = 1, monitor:DP-1, default:true, persistent:true
workspace = 2, monitor:DP-1, persistent:true
workspace = 3, monitor:DP-1, persistent:true
workspace = 4, monitor:DP-3, default:true, persistent:true
workspace = 5, monitor:DP-3, persistent:true
workspace = 6, monitor:DP-3, persistent:true

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.6

# Straight 1x setup for low-resolution displays like 1080p or 1440p
# Or for ultrawide monitors like 34" 3440x1440 or 49" 5120x1440
# env = GDK_SCALE,1
# monitor=,preferred,auto,1

# Portrait/rotated secondary monitor (transform: 1 = 90°, 3 = 270°)
# monitor = DP-2, preferred, auto, 1, transform, 1

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2
