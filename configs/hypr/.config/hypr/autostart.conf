# App-to-workspace assignments (belt + suspenders — exec-once rules below
# use [workspace N silent] syntax; these windowrules catch manual launches too)
#
# Workspace 4 (Prod, left monitor)
windowrule = workspace 4 silent, match:class ^(Todoist)$
windowrule = workspace 4 silent, match:class ^(Slack)$
windowrule = workspace 4 silent, match:class ^(1Password)$
windowrule = workspace 4 silent, match:class ^(org.gnome.Nautilus)$
# Workspace 6 (DB, left monitor)
windowrule = workspace 6 silent, match:class ^(jetbrains-datagrip)$
# Workspace 8 (Chat, right monitor)
windowrule = workspace 8 silent, match:class ^(org.telegram.desktop|TelegramDesktop)$
windowrule = workspace 8 silent, match:class ^(whatsapp-desktop-linux|WhatsApp.*)$
windowrule = workspace 8 silent, match:class ^(discord)$
# Workspace 9 (Music, right monitor)
windowrule = workspace 9 silent, match:class ^(Spotify)$

# Workspace 1 (Main) — Chrome
exec-once = [workspace 1 silent] uwsm-app -- google-chrome-stable

# Workspace 4 (Productivity) — Todoist, Nautilus, Slack, Terminal
exec-once = [workspace 4 silent] uwsm-app -- todoist
exec-once = [workspace 4 silent] uwsm-app -- nautilus --new-window
exec-once = [workspace 4 silent] uwsm-app -- slack
exec-once = [workspace 4 silent] uwsm-app -- xdg-terminal-exec

# Night light (hyprsunset) — schedules defined in hyprsunset.conf
exec-once = uwsm app -- hyprsunset
